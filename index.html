<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Rent a Kitchen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Varela+Round&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/tokens.css" />
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #fff; }
      body { font-family: 'Open Sans', sans-serif; color: rgb(32, 33, 36); }
      #root { width: 100%; height: 100%; display: flex; }
      button { font-family: inherit; }
      /* Mobile safe-area support */
      .rak-mobile-root {
        position: fixed; inset: 0;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        box-sizing: border-box;
      }
      .rak-mobile-topbar {
        padding-left: max(20px, env(safe-area-inset-left));
        padding-right: max(20px, env(safe-area-inset-right));
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
